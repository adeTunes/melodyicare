<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MelodyiCare Square OG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            width: 500px;
            height: 500px;
            background: #210B2C; /* Solid Dark Purple */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-box {
            width: 280px;
            height: 280px;
            background: #210B2C;
            border: 12px solid #BC96E6; /* Wisteria */
            border-radius: 60px; /* Rounded corner like app icon */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            padding: 40px;
            box-sizing: border-box;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .text {
            font-size: 48px;
            font-weight: 700;
        }

        .text span {
            color: #BC96E6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">
            <img src="logo2.png" alt="Logo">
        </div>
        <div class="text">Melody<span>iCare</span></div>
    </div>
</body>
</html>
