<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MelodyiCare OG Card</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@700&family=Inter:wght@500&display=swap");

      body {
        margin: 0;
        padding: 0;
        width: 1200px;
        height: 630px;
        background: #210b2c; /* Dark Purple */
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Inter", sans-serif;
        color: white;
        position: relative;
        overflow: hidden;
      }

      /* Subtle brand gradient */
      body::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle,
          rgba(188, 150, 230, 0.15) 0%,
          transparent 60%
        ); /* Wisteria glow */
        z-index: 1;
      }

      .container {
        position: relative;
        z-index: 10;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .logo-container {
        width: 180px;
        height: 180px;
        background: #210b2c;
        border: 8px solid #bc96e6; /* Wisteria border */
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 40px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        padding: 20px;
      }

      .logo-container img {
        width: 80%;
        height: 80%;
        object-fit: contain;
      }

      .brand-name {
        font-family: "Outfit", sans-serif;
        font-size: 84px;
        font-weight: 700;
        margin-bottom: 10px;
        letter-spacing: -2px;
      }

      .brand-name span {
        color: #bc96e6; /* Wisteria */
      }

      .tagline {
        font-size: 32px;
        font-weight: 500;
        opacity: 0.8;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #ffd166; /* Sunglow */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-container">
        <!-- Using logo2.png as requested, assuming it's the white version -->
        <img src="logo2.png" alt="Logo" />
      </div>
      <div class="brand-name">Melody<span>iCare</span></div>
      <div class="tagline">Caring, Compassion and Comfort</div>
    </div>
  </body>
</html>
